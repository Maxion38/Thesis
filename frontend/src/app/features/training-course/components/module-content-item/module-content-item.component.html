<div class="content">
    <span class="content__title"> {{ card.title }} </span>
    <span *ngIf="card.subtitle" class="content__subtitle"> {{ card.subtitle }} </span>
    <div class="content__edit-container" [routerLink]="card.editRoute"><span class="material-symbols-outlined content__edit-icon">edit</span></div>
    
    <div class="content__actions">
        <span *ngIf="isRemovable" class="material-symbols-outlined content__actions__close-icon">close</span>
        <span class="material-symbols-outlined content__actions__drag-icon" cdkDragHandle>drag_handle</span>
    </div>
</div>
