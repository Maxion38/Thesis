<div class="training-course">
  <div class="training-course__tabbar">
    <app-tabbar 
      [tabs]="tabbarItems" 
      [title]="(course$ | async)?.name ?? '...'" 
      [isTitleEditable]='true'
      (titleChange)="onTitleChange($event)"
      [backButton]="true" 
      [backRoute]="['/training-courses', 'creation']" 
    >  
    </app-tabbar>
  </div>
  <div class="training-course__content">
    <router-outlet></router-outlet>
  </div>
</div>
