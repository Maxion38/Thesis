<div class="menu">
  <div 
    *ngFor="let item of items"
    class="menu__element"
    routerLinkActive="active"
    [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
    [routerLink]="item.route"
  >
    <span class="material-symbols-outlined menu__icon">{{ item.iconName }}</span>  
    <span>{{ item.titre }}</span>
  </div>
</div>
